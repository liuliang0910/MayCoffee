<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线点单 - 五月咖啡 MayCoffee</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="images/1_主logo/五月咖啡 主LOGO 透明背景.svg" alt="五月咖啡 MayCoffee Logo"></a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">首页</a></li>
                    <li><a href="menu.html">产品菜单</a></li>
                    <li><a href="order.html">在线点单</a></li>
                    <li><a href="about.html">关于我们</a></li>
                    <li><a href="contact.html">联系我们</a></li>
                    <li><a href="feedback.html">客户留言</a></li>
                    <li><a href="member.html">会员中心</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="order-layout">
        <!-- 左侧分类导航 -->
        <aside class="order-sidebar">
            <nav class="order-categories" id="orderCategories"></nav>
        </aside>

        <!-- 右侧商品 -->
        <section class="order-content" id="orderContent">
            <div class="loading">菜单加载中...</div>
        </section>
    </div>

    <!-- 底部购物车条 -->
    <div class="cart-bar" id="cartBar">
        <div class="cart-bar-info" id="cartBarToggle">
            <div class="cart-icon-wrap">
                🛒
                <span class="cart-badge" id="cartBadge">0</span>
            </div>
            <div class="cart-total">
                <span class="cart-total-amount" id="cartTotal">¥0</span>
                <span class="cart-total-hint">点击查看购物车</span>
            </div>
        </div>
        <button class="cart-checkout-btn" id="checkoutBtn" disabled>去结算</button>
    </div>

    <!-- 规格定制弹窗 -->
    <div class="modal-mask" id="specModal">
        <div class="spec-sheet">
            <div class="spec-header">
                <h3 id="specName">商品名称</h3>
                <button class="sheet-close" id="specClose">&times;</button>
            </div>
            <div class="spec-body" id="specBody"></div>
            <div class="spec-footer">
                <div class="spec-qty">
                    <button class="qty-btn" id="specMinus">-</button>
                    <span id="specQty">1</span>
                    <button class="qty-btn" id="specPlus">+</button>
                </div>
                <button class="spec-add-btn" id="specAdd">加入购物车 <span id="specPrice">¥0</span></button>
            </div>
        </div>
    </div>

    <!-- 购物车抽屉 -->
    <div class="modal-mask" id="cartModal">
        <div class="cart-sheet">
            <div class="spec-header">
                <h3>购物车</h3>
                <button class="sheet-close" id="cartClose">&times;</button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-sheet-footer">
                <button class="cart-clear" id="cartClear">清空</button>
                <div class="cart-sheet-total">合计 <span id="cartSheetTotal">¥0</span></div>
            </div>
        </div>
    </div>

    <!-- 结算弹窗 -->
    <div class="modal-mask" id="checkoutModal">
        <div class="checkout-sheet">
            <div class="spec-header">
                <h3>确认订单</h3>
                <button class="sheet-close" id="checkoutClose">&times;</button>
            </div>
            <div class="checkout-body">
                <div class="form-row">
                    <label>取餐人姓名 <span class="req">*</span></label>
                    <input type="text" id="custName" placeholder="请输入称呼">
                </div>
                <div class="form-row">
                    <label>联系电话</label>
                    <input type="tel" id="custPhone" placeholder="方便我们联系您（选填）">
                </div>
                <div class="form-row">
                    <label>取餐方式</label>
                    <div class="seg-group" id="pickupGroup">
                        <button type="button" class="seg-btn active" data-val="到店自取">到店自取</button>
                        <button type="button" class="seg-btn" data-val="堂食">堂食</button>
                    </div>
                </div>
                <div class="form-row">
                    <label>备注</label>
                    <input type="text" id="custNote" placeholder="例如：少冰、不要吸管（选填）">
                </div>
                <div class="checkout-summary" id="checkoutSummary"></div>
                <div class="pay-tip">下单后请到店出示<strong>取餐号</strong>并完成支付。</div>
            </div>
            <div class="checkout-footer">
                <div class="cart-sheet-total">应付 <span id="checkoutTotal">¥0</span></div>
                <button class="submit-order-btn" id="submitOrder">提交订单</button>
            </div>
        </div>
    </div>

    <!-- 下单成功弹窗 -->
    <div class="modal-mask" id="successModal">
        <div class="success-sheet">
            <div class="success-icon">✅</div>
            <h3>下单成功！</h3>
            <div class="success-code">取餐号 <strong id="successCode">000</strong></div>
            <p class="success-no">订单号：<span id="successNo"></span></p>
            <p class="success-tip" id="successPoints"></p>
            <p class="success-tip">请到店出示取餐号，并完成支付。</p>
            <button class="success-btn" id="successOk">好的</button>
        </div>
    </div>

    <script src="js/order.js"></script>
</body>
</html>
